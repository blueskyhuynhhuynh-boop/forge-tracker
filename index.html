<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0A0B0D">
<title>FORGE — Road to Stage 2029</title>
<style>
:root{
  --bg-0:#0A0B0D; --bg-1:#121417; --bg-2:#181B20; --bg-3:#1F232A;
  --line:#262B33; --line-soft:#1C2026;
  --tx-1:#F4F6F8; --tx-2:#A8B0BB; --tx-3:#6B7280; --tx-4:#454B54; --ghost:#8A929E;
  --gold:#E8B04B; --gold-bright:#F4C463; --gold-press:#D69A32; --gold-wash:rgba(232,176,75,0.12);
  --up:#34D399; --down:#F87171; --warn:#FFC53D; --info:#60A5FA; --flat:#5B6470;
  --pr:#FFD466; --fst:#B061FF; --fst-wash:rgba(176,97,255,0.12);
  --back:#5EAEA0; --chest:#D9776A; --shoulders:#C9A227; --quads:#B5739E; --hams:#FFC24B;
  --biceps:#6E94D6; --triceps:#E0975A; --calves:#8FA35B; --abs:#9AA0AA;
  --r-sm:8px; --r-md:14px; --r-lg:20px; --r-pill:999px;
  --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s5:24px; --s6:32px; --s7:48px; --s8:64px;
  --ui:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
  --mono:'SF Mono','Roboto Mono',ui-monospace,'Cascadia Mono',Consolas,monospace;
  --ease-in:cubic-bezier(0.22,1,0.36,1); --ease-out:cubic-bezier(0.4,0,0.2,1);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg-0);color:var(--tx-1);font-family:var(--ui);font-size:16px;line-height:1.5;overscroll-behavior-y:none}
body{padding-bottom:calc(var(--s8) + env(safe-area-inset-bottom,0px));max-width:900px;margin:0 auto}
.num{font-family:var(--mono);font-variant-numeric:tabular-nums}
button{font-family:inherit;color:inherit;border:none;background:none;cursor:pointer}
input{font-family:inherit;color:inherit}
input::placeholder{color:var(--tx-3)}
button:focus-visible,.daychip:focus-visible,.chip:focus-visible,input:focus-visible,[data-act]:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.stepper input:focus-visible{outline:2px solid var(--gold);outline-offset:-2px}
.caps{text-transform:uppercase;letter-spacing:.08em;font-size:.6875rem;color:var(--tx-3);font-weight:600}
.hidden{display:none!important}

/* HEADER */
header.app{position:sticky;top:0;z-index:40;background:rgba(10,11,13,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--line-soft)}
.hbar{display:flex;align-items:center;gap:var(--s3);padding:10px var(--s4) 8px}
.htitle{flex:1;min-width:0}
.htitle .day{font-size:.9375rem;font-weight:700;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.htitle .sub{font-size:.75rem;color:var(--tx-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hbtn{width:40px;height:40px;border-radius:var(--r-pill);display:flex;align-items:center;justify-content:center;background:var(--bg-2);border:1px solid var(--line);font-weight:700;font-size:.8125rem;color:var(--tx-2)}
.hbtn:active{background:var(--bg-3)}
.savedot{width:9px;height:9px;border-radius:50%;background:var(--up);transition:background .2s,box-shadow .3s;flex:0 0 auto}
.savedot.flash{background:var(--warn);box-shadow:0 0 8px var(--warn)}
.restpill{display:flex;align-items:center;gap:6px;height:40px;padding:0 14px;border-radius:var(--r-pill);background:var(--bg-2);border:1px solid var(--line);font-family:var(--mono);font-size:.8125rem;font-weight:600}
.restpill.active{border-color:var(--gold);color:var(--gold);box-shadow:0 0 0 1px var(--gold),0 0 20px var(--gold-wash)}
.restpill.warn{border-color:var(--warn);color:var(--warn);animation:pulse .8s infinite}
@keyframes pulse{50%{opacity:.55}}
.rail{height:4px;margin:0 var(--s4) 8px;background:var(--bg-3);border-radius:var(--r-pill);position:relative;overflow:hidden}
.rail>i{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,var(--gold-press),var(--gold-bright));border-radius:var(--r-pill);transition:width .6s var(--ease-in)}
.railwrap{display:flex;align-items:center;gap:var(--s2);padding:0 var(--s4) 8px}
.railwrap .rail{flex:1;margin:0}
.railwrap .lbl{font-size:.625rem;color:var(--tx-3);white-space:nowrap;font-family:var(--mono);font-weight:600}
.phasepill{display:inline-flex;align-items:center;gap:6px;margin:0 var(--s4) var(--s3);padding:5px 12px;border-radius:var(--r-pill);background:var(--gold-wash);border:1px solid rgba(232,176,75,.3);color:var(--gold-bright);font-size:.6875rem;font-weight:700;letter-spacing:.04em}

/* MAIN */
main{padding:var(--s2) var(--s4) var(--s5);animation:fadein .22s var(--ease-in)}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.screen-title{font-size:1.5rem;font-weight:800;letter-spacing:-.02em;margin:var(--s3) 0 var(--s2)}
.muted{color:var(--tx-3)}

/* CARDS */
.card{background:var(--bg-2);border:1px solid var(--line);border-radius:var(--r-md);box-shadow:inset 0 1px 0 rgba(255,255,255,.03);margin-bottom:var(--s3);overflow:hidden}
.card.raised{box-shadow:inset 0 1px 0 rgba(255,255,255,.03),0 2px 12px rgba(0,0,0,.4)}
.card-pad{padding:var(--s4)}

/* DAY PICKER */
.daypick{display:flex;gap:var(--s2);overflow-x:auto;padding:var(--s2) 0 var(--s3);scrollbar-width:none}
.daypick::-webkit-scrollbar{display:none}
.daychip{flex:0 0 auto;min-width:48px;height:54px;border-radius:var(--r-sm);background:var(--bg-2);border:1px solid var(--line);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--tx-2)}
.daychip .dn{font-size:.625rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.daychip .dd{font-size:1.0625rem;font-weight:700;font-family:var(--mono)}
.daychip.sel{background:var(--gold-wash);border-color:var(--gold);color:var(--gold-bright);box-shadow:0 0 0 1px var(--gold)}
.daychip.today::after{content:"";width:5px;height:5px;border-radius:50%;background:var(--gold);position:absolute;transform:translateY(20px)}
.daychip.rest{opacity:.7}
.wchip{flex:0 0 auto;min-width:84px;padding:10px 14px;border-radius:var(--r-md);background:var(--bg-2);border:1px solid var(--line);display:flex;flex-direction:column;align-items:flex-start;gap:3px;color:var(--tx-2)}
.wchip .wn{font-size:.8125rem;font-weight:700;white-space:nowrap}
.wchip .wc{font-size:.625rem;color:var(--tx-3);font-family:var(--mono)}
.wchip.sel{background:var(--gold-wash);border-color:var(--gold);color:var(--gold-bright);box-shadow:0 0 0 1px var(--gold)}
.wchip.sel .wc{color:var(--gold-bright)}
.datenav{display:flex;align-items:center;gap:var(--s2);margin:var(--s2) 0 var(--s3)}
.datenav .datelbl{flex:1;text-align:center;font-size:.9375rem;font-weight:700}
.navb{width:44px;height:44px;border-radius:var(--r-sm);background:var(--bg-2);border:1px solid var(--line);font-size:1.4rem;color:var(--tx-2);display:flex;align-items:center;justify-content:center}
.navb:active{background:var(--bg-3);color:var(--gold)}
.addex{width:100%;height:52px;border-radius:var(--r-md);background:transparent;border:1.5px dashed var(--line);color:var(--tx-2);font-size:.9375rem;font-weight:700;margin-bottom:var(--s3)}
.addex:active{border-color:var(--gold);color:var(--gold-bright);background:var(--gold-wash)}

/* EXERCISE CARD */
.ex{margin-bottom:var(--s3)}
.ex-head{display:flex;align-items:center;gap:var(--s3);padding:var(--s4);cursor:pointer}
.ex.fst{border-left:3px solid var(--fst)}
.ex-name{flex:1;min-width:0}
.ex-name .nm{font-size:1.0625rem;font-weight:700;letter-spacing:-.01em;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ex-name .meta{font-size:.75rem;color:var(--tx-3);margin-top:2px;display:flex;gap:var(--s2);align-items:center;flex-wrap:wrap}
.badge{font-size:.625rem;font-weight:800;padding:2px 7px;border-radius:var(--r-pill);letter-spacing:.05em}
.badge.fst{background:var(--fst-wash);color:#c89bff;border:1px solid rgba(176,97,255,.35)}
.mtag{font-size:.625rem;font-weight:700;padding:2px 7px;border-radius:var(--r-pill);text-transform:uppercase;letter-spacing:.04em}
.chev{width:24px;height:24px;color:var(--tx-3);transition:transform .18s var(--ease-in)}
.ex.open .chev{transform:rotate(180deg)}
.setcount{font-family:var(--mono);font-size:.8125rem;color:var(--tx-2);font-weight:600}
.ex-body{display:none;border-top:1px solid var(--line-soft);padding:var(--s3) var(--s4) var(--s4)}
.ex.open .ex-body{display:block;animation:fadein .18s}

.setrow{display:flex;align-items:center;gap:var(--s3);padding:8px 0;border-bottom:1px solid var(--line-soft);font-family:var(--mono)}
.setrow:last-child{border-bottom:none}
.setrow .si{width:22px;color:var(--tx-3);font-size:.8125rem;font-weight:700;text-align:center}
.setrow .sv{flex:1;font-size:.9375rem;font-weight:600}
.setrow .se1{font-size:.75rem;color:var(--tx-3)}
.setrow .pr{color:var(--pr);font-size:.6875rem;font-weight:800}
.setrow .del{width:30px;height:30px;border-radius:6px;color:var(--tx-3);display:flex;align-items:center;justify-content:center}
.setrow .del:active{background:var(--bg-3);color:var(--down)}
.setrow.fstbubblerow{justify-content:center;gap:7px;border:none;padding-top:2px}
.bubble{width:18px;height:18px;border-radius:50%;border:2px solid var(--fst);opacity:.4;transition:all .15s var(--ease-in)}
.bubble.on{background:var(--fst);opacity:1;transform:scale(1.05);box-shadow:0 0 8px var(--fst-wash)}

.activerow{background:var(--bg-3);border-radius:var(--r-md);padding:var(--s3);margin-top:var(--s3)}
.stepgrid{display:flex;gap:var(--s3)}
.stepcol{flex:1}
.stepcol .lbl{text-align:center;margin-bottom:6px}
.stepper{display:flex;align-items:center;background:var(--bg-1);border:1px solid var(--line);border-radius:var(--r-md);overflow:hidden;height:64px}
.stepper button{width:54px;height:100%;font-size:1.6rem;font-weight:300;color:var(--tx-2);display:flex;align-items:center;justify-content:center}
.stepper button:active{background:var(--bg-3);color:var(--gold)}
.stepper input{flex:1;width:100%;min-width:0;text-align:center;background:none;border:none;outline:none;font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:2rem;font-weight:700;color:var(--tx-1);padding:0}
.stepper input::placeholder{color:var(--ghost);font-weight:600}
.fstlock{display:flex;align-items:center;justify-content:center;gap:8px;height:64px;background:var(--fst-wash);border:1px solid rgba(176,97,255,.4);border-radius:var(--r-md);font-family:var(--mono);font-weight:700;color:#c89bff;font-size:1.1rem}
.fstlock .unlock{width:34px;height:34px;border-radius:8px;background:rgba(176,97,255,.2);display:flex;align-items:center;justify-content:center;font-size:.9rem}
.logbtn{width:100%;height:60px;margin-top:var(--s3);border-radius:var(--r-md);background:linear-gradient(180deg,var(--gold-bright),var(--gold));color:#1a1303;font-size:1.0625rem;font-weight:800;letter-spacing:.04em;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .12s var(--ease-out),filter .12s}
.logbtn:active{transform:scale(.97);filter:brightness(1.08)}
.logbtn:disabled{background:var(--bg-3);color:var(--tx-4);cursor:default;transform:none}
.logbtn.flash{animation:logflash .4s}
@keyframes logflash{0%{box-shadow:-4px 0 0 var(--up)}100%{box-shadow:none}}
.rowbtns{display:flex;gap:var(--s2);margin-top:var(--s3)}
.minib{flex:1;height:42px;border-radius:var(--r-sm);background:var(--bg-1);border:1px solid var(--line);color:var(--tx-2);font-size:.8125rem;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px}
.minib:active{background:var(--bg-3);color:var(--tx-1)}
.rpeline{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:var(--s3);font-size:.8125rem;color:var(--tx-3)}
.rpeline input{width:60px;height:36px;text-align:center;background:var(--bg-1);border:1px solid var(--line);border-radius:6px;font-family:var(--mono);font-weight:700;color:var(--tx-1)}

.consist{display:flex;align-items:center;gap:8px;margin-top:var(--s3);font-size:.75rem;font-weight:600}
.consist.ok{color:var(--up)} .consist.bad{color:var(--down)}

/* KPI */
.kpis{display:grid;grid-template-columns:1fr 1fr;gap:var(--s3);margin-bottom:var(--s4)}
.kpi{background:var(--bg-2);border:1px solid var(--line);border-radius:var(--r-md);padding:var(--s4)}
.kpi .k-lbl{font-size:.625rem}
.kpi .k-val{font-family:var(--mono);font-size:1.6rem;font-weight:800;letter-spacing:-.02em;margin-top:4px}
.kpi .k-unit{font-size:.8rem;color:var(--tx-3);font-weight:600}
.delta{display:inline-flex;align-items:center;gap:3px;font-family:var(--mono);font-size:.75rem;font-weight:700;padding:2px 6px;border-radius:var(--r-pill);margin-top:6px}
.delta.up{color:var(--up);background:rgba(52,211,153,.1)}
.delta.down{color:var(--down);background:rgba(248,113,113,.1)}
.delta.flat{color:var(--flat);background:rgba(91,100,112,.12)}
.delta.new{color:var(--gold-bright);background:var(--gold-wash)}

/* CHART CARD */
.chart-card{padding:var(--s4)}
.chart-head{display:flex;align-items:baseline;justify-content:space-between;gap:var(--s2);margin-bottom:var(--s2)}
.chart-head h3{margin:0;font-size:1.0625rem;font-weight:700;letter-spacing:-.01em}
.chart-insight{font-size:.8125rem;color:var(--tx-2);margin-top:var(--s3);padding-top:var(--s3);border-top:1px solid var(--line-soft);line-height:1.45}
.chart-insight b{color:var(--tx-1)}
svg{display:block;width:100%;height:auto;overflow:visible}
.legend{display:flex;flex-wrap:wrap;gap:var(--s3);margin-top:var(--s3);font-size:.6875rem;color:var(--tx-2)}
.legend span{display:inline-flex;align-items:center;gap:5px}
.legend i{width:10px;height:10px;border-radius:2px;display:inline-block}
.empty{padding:var(--s6) var(--s4);text-align:center;color:var(--tx-3);font-size:.875rem}
.empty .big{font-size:2rem;margin-bottom:var(--s2);opacity:.5}

.selchips{display:flex;gap:var(--s2);overflow-x:auto;padding-bottom:var(--s2);scrollbar-width:none}
.selchips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;padding:7px 14px;border-radius:var(--r-pill);background:var(--bg-2);border:1px solid var(--line);font-size:.75rem;font-weight:600;color:var(--tx-2)}
.chip.sel{background:var(--gold-wash);border-color:var(--gold);color:var(--gold-bright)}
.stickybar{position:sticky;top:56px;z-index:20;background:var(--bg-0);padding-top:var(--s2);margin:0 calc(-1*var(--s4));padding-left:var(--s4);padding-right:var(--s4)}

/* HISTORY */
.weekhdr{display:flex;align-items:center;justify-content:space-between;margin:var(--s4) 0 var(--s2)}
.weekhdr .wk{font-size:.6875rem;font-weight:700;color:var(--tx-3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em}
.sess{padding:var(--s4)}
.sess .sh{display:flex;align-items:center;justify-content:space-between;gap:var(--s2)}
.sess .sh .dt{font-size:.9375rem;font-weight:700}
.sess .sh .dk{font-size:.75rem;color:var(--tx-3)}
.sess .stats{display:flex;gap:var(--s4);margin-top:var(--s2);font-family:var(--mono);font-size:.8125rem;color:var(--tx-2)}
.sess .stats b{color:var(--tx-1)}
.sess .elist{margin-top:var(--s3);border-top:1px solid var(--line-soft);padding-top:var(--s3);font-size:.8125rem}
.sess .elist .e{display:flex;justify-content:space-between;gap:var(--s2);padding:3px 0;color:var(--tx-2)}
.sess .elist .e .v{font-family:var(--mono);color:var(--tx-1)}

/* MISSION */
.ring-wrap{display:flex;align-items:center;gap:var(--s4)}
.ring-info{flex:1}
.ring-info .big{font-family:var(--mono);font-size:2.75rem;font-weight:800;letter-spacing:-.03em;line-height:1}
.ring-info .lbl{font-size:.75rem;color:var(--tx-3);margin-top:4px}
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:var(--s3)}
.stat{background:var(--bg-1);border:1px solid var(--line);border-radius:var(--r-sm);padding:var(--s3)}
.stat .v{font-family:var(--mono);font-size:1.3rem;font-weight:800}
.stat .l{font-size:.625rem;color:var(--tx-3);margin-top:2px}
.field{margin-bottom:var(--s3)}
.field label{display:block;font-size:.75rem;color:var(--tx-2);margin-bottom:6px;font-weight:600}
.field input,.field select{width:100%;height:46px;background:var(--bg-1);border:1px solid var(--line);border-radius:var(--r-sm);padding:0 var(--s3);font-size:.9375rem;font-family:var(--mono);color:var(--tx-1)}
.row2{display:flex;gap:var(--s3)}
.row2>*{flex:1}
.toggle{display:flex;background:var(--bg-1);border:1px solid var(--line);border-radius:var(--r-pill);padding:3px}
.toggle button{flex:1;height:38px;border-radius:var(--r-pill);font-size:.8125rem;font-weight:700;color:var(--tx-3)}
.toggle button.on{background:var(--gold-wash);color:var(--gold-bright);box-shadow:0 0 0 1px var(--gold)}
.btn{height:48px;border-radius:var(--r-md);font-size:.9375rem;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;width:100%}
.btn.gold{background:linear-gradient(180deg,var(--gold-bright),var(--gold));color:#1a1303}
.btn.ghost{background:var(--bg-1);border:1px solid var(--line);color:var(--tx-1)}
.btn.danger{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:var(--down)}
.btn:active{filter:brightness(1.1)}
.prwall .pr-item{display:flex;align-items:center;gap:var(--s3);padding:var(--s3) 0;border-bottom:1px solid var(--line-soft)}
.prwall .pr-item:last-child{border-bottom:none}
.prwall .pr-item .nm{flex:1;font-size:.875rem;font-weight:600}
.prwall .pr-item .v{font-family:var(--mono);font-weight:800;color:var(--gold-bright)}
.prwall .pr-item .sub{font-size:.6875rem;color:var(--tx-3)}
.checkitem{display:flex;align-items:center;gap:var(--s3);padding:var(--s3);border-bottom:1px solid var(--line-soft)}
.checkitem:last-child{border-bottom:none}
.checkitem .box{width:26px;height:26px;border-radius:7px;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.checkitem.done .box{background:var(--up);border-color:var(--up);color:#04231a}
.checkitem.done .lbl{color:var(--tx-3);text-decoration:line-through}
.motivate{font-size:.875rem;font-style:italic;color:var(--gold-bright);text-align:center;padding:var(--s4);line-height:1.5}

/* NAV */
nav.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(18,20,23,.96);backdrop-filter:blur(14px);border-top:1px solid var(--line);display:flex;padding:6px 6px calc(6px + env(safe-area-inset-bottom,0px));max-width:900px;margin:0 auto}
nav.tabbar button{flex:1;height:54px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--tx-3);border-radius:var(--r-sm);transition:color .15s}
nav.tabbar button .ic{font-size:1.2rem;transition:transform .15s}
nav.tabbar button .lb{font-size:.625rem;font-weight:700;letter-spacing:.02em}
nav.tabbar button.on{color:var(--gold-bright)}
nav.tabbar button.on .ic{transform:translateY(-2px)}
nav.tabbar button.on{background:var(--gold-wash)}

/* SHEET */
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:60;opacity:0;pointer-events:none;transition:opacity .2s}
.scrim.show{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:61;background:var(--bg-1);border-top:1px solid var(--line);border-radius:var(--r-lg) var(--r-lg) 0 0;transform:translateY(100%);transition:transform .25s var(--ease-in);max-width:900px;margin:0 auto;padding:var(--s2) var(--s5) calc(var(--s6) + env(safe-area-inset-bottom,0px));max-height:88vh;overflow-y:auto}
.sheet.show{transform:none}
.grab{width:40px;height:4px;border-radius:var(--r-pill);background:var(--line);margin:var(--s2) auto var(--s4)}
.sheet h3{margin:0 0 var(--s4);font-size:1.25rem;font-weight:800}

/* ---------- STORAGE ---------- */
const KEY="forge.v1", METAKEY="forge.meta";
let DB=null, saveTimer=null, storageOK=true;
function load(){
 try{
  const raw=localStorage.getItem(KEY);
  if(!raw){DB=defaultDB();persist(true);return;}
  let parsed;
  try{parsed=JSON.parse(raw);}catch(e){
    try{localStorage.setItem(KEY+".corrupt."+Date.now(),raw);}catch(_){}
    showBanner("Couldn't read saved data. A backup of the corrupt file was kept. Starting fresh — import a backup in Mission › Backup if you have one.");
    DB=defaultDB();persist(true);return;
  }
  DB=migrate(parsed);
 }catch(e){DB=defaultDB();}
}
function migrate(d){
 if(!d||typeof d!=="object")return defaultDB();
 const def=defaultDB();
 // shallow heal of required top-level keys
 d.schemaVersion=d.schemaVersion||1;
 d.settings=Object.assign({},def.settings,d.settings||{});
 d.meta=Object.assign({},def.meta,d.meta||{});
 d.athlete=Object.assign({},def.athlete,d.athlete||{});
 if(!d.athlete.goal)d.athlete.goal=def.athlete.goal;
 if(!d.athlete.phase)d.athlete.phase=def.athlete.phase;
 // coerce critical sub-fields so a parseable-but-corrupt backup can never NaN the UI
 var _vd=function(x){return typeof x==="string"&&/^\d{4}-\d{2}-\d{2}$/.test(x);};
 var _vn=function(x){return typeof x==="number"&&isFinite(x);}; // isFinite(null)===true, so require a real number
 if(!_vd(d.athlete.goal.showDate))d.athlete.goal.showDate=def.athlete.goal.showDate;
 if(!_vn(d.athlete.goal.targetWeightLb))d.athlete.goal.targetWeightLb=def.athlete.goal.targetWeightLb;
 if(!_vn(d.athlete.goal.targetBfPct))d.athlete.goal.targetBfPct=def.athlete.goal.targetBfPct;
 if(!_vd(d.athlete.phase.start))d.athlete.phase.start=def.athlete.phase.start;
 if(!d.athlete.phase.name)d.athlete.phase.name=def.athlete.phase.name;
 if(!_vn(d.athlete.phase.index))d.athlete.phase.index=def.athlete.phase.index;
 // v2: migrate any weekday-based program to the PPL + Shoulders/Forearm rotation; never destroy logged sessions
 if(!d.program||!d.program.exercises)d.program=def.program;
 if(d.program.days&&!d.program.workouts)d.program={cycle:def.program.cycle,workouts:def.program.workouts,exercises:{}};
 if(!d.program.workouts)d.program.workouts=def.program.workouts;
 if(!d.program.cycle)d.program.cycle=def.program.cycle;
 if(!d.program.exercises)d.program.exercises={};
 var _dmap={mon:'pull',tue:'shoulder',wed:'legs',thu:'push',fri:'shoulder',sat:'rest',sun:'rest'};
 Object.keys(d.sessions||{}).forEach(function(k){var s=d.sessions[k];if(!s)return;if(!s.workoutKey)s.workoutKey=_dmap[s.dayKey]||'push';if(!s.type)s.type=s.workoutKey==='rest'?'rest':'lift';});
 d.schemaVersion=2;
 d.muscleTargets=Object.assign({},def.muscleTargets,d.muscleTargets||{});
 d.sessions=d.sessions||{};
 d.bodyLog=Array.isArray(d.bodyLog)?d.bodyLog:[];
 return d;
}
function persist(skipDot){
 if(!DB)return;
 DB.meta.updatedAt=new Date().toISOString();
 try{
  localStorage.setItem(KEY,JSON.stringify(DB));
  localStorage.setItem(METAKEY,JSON.stringify({schemaVersion:DB.schemaVersion,lastSaved:DB.meta.updatedAt}));
  storageOK=true;
  if(!skipDot)flashSave();
 }catch(e){
  storageOK=false;
  toast("Storage full / unavailable — export a backup now.",null,null,4000);
 }
}
function save(){ if(saveTimer)clearTimeout(saveTimer); saveTimer=setTimeout(persist,150); }

/* ---------- HELPERS ---------- */
function $(s,r){return (r||document).querySelector(s);}
function $$(s,r){return Array.prototype.slice.call((r||document).querySelectorAll(s));}
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function pad(n){return String(n).padStart(2,"0");}
function todayISO(){const d=new Date();return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
function parseLocal(s){const p=s.split("-");return new Date(+p[0],+p[1]-1,+p[2]);}
function dayKeyOf(dateStr){return DOW[parseLocal(dateStr).getDay()];}
function fmtDate(s){const d=parseLocal(s);return d.toLocaleDateString(DB.settings.lang==="vi"?"vi-VN":"en-US",{weekday:"short",day:"numeric",month:"short"});}
function isoWeek(d){
 const date=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
 const dn=(date.getUTCDay()+6)%7; date.setUTCDate(date.getUTCDate()-dn+3);
 const ft=new Date(Date.UTC(date.getUTCFullYear(),0,4));
 const fdn=(ft.getUTCDay()+6)%7; ft.setUTCDate(ft.getUTCDate()-fdn+3);
 const wk=1+Math.round((date-ft)/(7*864e5));
 return {year:date.getUTCFullYear(),week:wk};
}
function weekKey(dateStr){const w=isoWeek(parseLocal(dateStr));return w.year+"-W"+pad(w.week);}
function mondayOf(d){const x=new Date(d);const dn=(x.getDay()+6)%7;x.setDate(x.getDate()-dn);x.setHours(0,0,0,0);return x;}
function lastNWeekKeys(n){
 const m=mondayOf(new Date());const out=[];
 for(let i=n-1;i>=0;i--){const d=new Date(m);d.setDate(d.getDate()-i*7);const w=isoWeek(d);out.push(w.year+"-W"+pad(w.week));}
 return out;
}
function fmtN(n){if(n==null||isNaN(n))return"—";const r=Math.round(n*10)/10;return (r%1===0?r.toFixed(0):r.toFixed(1));}
function fmtInt(n){if(n==null||isNaN(n))return"—";return Math.round(n).toLocaleString("en-US");}
function e1rm(w,reps){return w*(1+reps/30);}
function toDisp(v,storedUnit){if(v==null)return null;const u=DB.settings.units;if(!storedUnit||storedUnit===u)return v;return u==="kg"?v/LBPERKG:v*LBPERKG;}
function unitLbl(){return DB.settings.units;}

/* ---------- SESSION ACCESS ---------- */
function suggestedWorkout(dateStr){
 const cy=DB.program.cycle;const order=cy.order;
 const start=parseLocal(cy.startDate||todayISO()),d=parseLocal(dateStr);
 const dayIndex=Math.round((d-start)/864e5);
 const period=(cy.onDays||3)+(cy.offDays||1);
 const pos=((dayIndex%period)+period)%period;
 if(pos>=(cy.onDays||3))return 'rest';
 const fullPeriods=Math.floor(dayIndex/period);
 const trainingBefore=fullPeriods*(cy.onDays||3)+pos;
 const idx=((trainingBefore%order.length)+order.length)%order.length;
 return order[idx];
}
function workoutKeyFor(dateStr){const s=DB.sessions[dateStr];if(s&&s.workoutKey)return s.workoutKey;return suggestedWorkout(dateStr);}
function makeEntry(id,def){return {exId:id,name:{en:def.name.en,vi:def.name.vi},muscle:def.muscle,isFst7:def.isFst7,defaultSets:def.defaultSets,restSec:def.restSec,fst7:def.fst7,fstWeight:null,fstUnlocked:false,note:"",sets:[]};}
function ensureSession(dateStr){
 let s=DB.sessions[dateStr];
 if(!s){
  const wk=workoutKeyFor(dateStr);
  s={id:"s_"+Date.now(),date:dateStr,workoutKey:wk,type:wk==='rest'?'rest':'lift',startedAt:null,endedAt:null,note:"",cardioMin:null,entries:[],checks:{}};
  const w=DB.program.workouts[wk];
  if(w&&w.exerciseIds){w.exerciseIds.forEach(id=>{const def=DB.program.exercises[id];if(def)s.entries.push(makeEntry(id,def));});}
  DB.sessions[dateStr]=s;
 }
 return s;
}
function setWorkout(dateStr,wk){
 const s=ensureSession(dateStr);
 if(s.workoutKey===wk)return;
 const keep=s.entries.filter(e=>e.sets&&e.sets.length);
 if(keep.length&&!confirm(DB.settings.lang==="vi"?"Đổi buổi tập? Các set đã ghi sẽ được giữ lại.":"Switch workout? Logged sets will be kept.")){return;}
 s.workoutKey=wk;s.type=wk==='rest'?'rest':'lift';
 const ids=(DB.program.workouts[wk]?DB.program.workouts[wk].exerciseIds:[]);
 const out=[];
 ids.forEach(id=>{const def=DB.program.exercises[id];if(!def)return;const ex=keep.find(k=>k.exId===id);out.push(ex||makeEntry(id,def));});
 keep.forEach(k=>{if(ids.indexOf(k.exId)<0)out.push(k);});
 s.entries=out;
 save();S.openEx=null;render();
}

function completedSessions(){

}
function sessionTonnage(s){let t=0;s.entries.forEach(e=>e.sets.forEach(st=>{t+=toDisp(st.weight,st.unit)*st.reps;}));return t;}

/* per ISO week: map exId->{topE1rm,tonnage,sets,topWeight}, map muscle->{tonnage,sets} */
function weekStats(wk){
 const byEx={},byMus={},days=new Set();
 completedSessions().forEach(s=>{
  if(weekKey(s.date)!==wk)return;
  if(sessionSets(s)>0)days.add(s.date);
  s.entries.forEach(e=>{
   e.sets.forEach(st=>{
    const w=toDisp(st.weight,st.unit),er=e1rm(w,st.reps),ton=w*st.reps;
    if(!byEx[e.exId])byEx[e.exId]={topE1rm:0,tonnage:0,sets:0,topWeight:0,name:e.name};
    const ex=byEx[e.exId];ex.tonnage+=ton;ex.sets++;ex.topE1rm=Math.max(ex.topE1rm,er);ex.topWeight=Math.max(ex.topWeight,w);
    if(!byMus[e.muscle])byMus[e.muscle]={tonnage:0,sets:0};
    byMus[e.muscle].tonnage+=ton;byMus[e.muscle].sets++;
   });
  });
 });
 return {byEx:byEx,byMus:byMus,trainedDays:days.size};
}
function prFor(exId,excludeTs){
 let maxW={v:0,reps:0,date:null},bestE={v:0,date:null};
 completedSessions().forEach(s=>{
  s.entries.forEach(e=>{ if(e.exId!==exId)return;
   e.sets.forEach(st=>{ if(excludeTs&&st.ts===excludeTs)return;
    const w=toDisp(st.weight,st.unit),er=e1rm(w,st.reps);
    if(w>maxW.v){maxW={v:w,reps:st.reps,date:s.date};}
    if(er>bestE.v){bestE={v:er,date:s.date};}
   });
  });
 });
 return {maxWeight:maxW,bestE1rm:bestE};
}

}

 reps=Math.round(reps);

 if(!s.startedAt)s.startedAt=new Date().toISOString();
 if(e.isFst7&&e.fstWeight==null)e.fstWeight=w;

 e.sets.push({i:e.sets.length+1,weight:w,unit:unit,reps:reps,rpe:rpe,done:true,isPR:isPR,e1rm:er,ts:ts});
 save();
 S.openEx=exId;
 render();
 // animate after render

 if(isPR){celebratePR(exId);}
 // rest timer

 if(rest)startTimer(rest);
 vibrate(15);

function repeatSet(exId){
 const s=ensureSession(S.selDate);const e=s.entries.find(x=>x.exId===exId);if(!e||!e.sets.length)return;
 const last=e.sets[e.sets.length-1];
 if(e.isFst7&&e.sets.length>=7){toast("FST-7 complete (7/7)");return;}
 const er=e1rm(last.weight,last.reps);
 e.sets.push(Object.assign({},last,{i:e.sets.length+1,isPR:false,e1rm:er,ts:new Date().toISOString()}));
 save();S.openEx=exId;render();
 const rest=e.isFst7?DB.settings.fst7RestSec:(e.restSec||DB.settings.restDefaultSec);if(rest)startTimer(rest);
}
function delSet(exId,i){
 const s=ensureSession(S.selDate);const e=s.entries.find(x=>x.exId===exId);if(!e)return;
 const removed=e.sets.splice(i,1)[0];

 toast(DB.settings.lang==="vi"?"Đã xóa set":"Set deleted",DB.settings.lang==="vi"?"Hoàn tác":"Undo",()=>{

 });

function copyWeek(exId){

 const prev=completedSessions().filter(x=>x.date<S.selDate).reverse();
 let src=null;for(const ps of prev){const pe=ps.entries.find(x=>x.exId===exId&&x.sets.length>0);if(pe){src=pe;break;}}
 if(!src){toast(DB.settings.lang==="vi"?"Chưa có dữ liệu tuần trước":"No previous data for this lift");return;}
 const old=e.sets.slice();
 e.sets=src.sets.map((st,k)=>({i:k+1,weight:st.weight,unit:st.unit,reps:st.reps,rpe:null,done:true,isPR:false,e1rm:e1rm(st.weight,st.reps),ts:new Date().toISOString()}));
 if(e.isFst7)e.fstWeight=e.sets.length?e.sets[0].weight:null;
 save();S.openEx=exId;render();
 toast(DB.settings.lang==="vi"?"Đã chép "+e.sets.length+" set":"Copied "+e.sets.length+" sets",DB.settings.lang==="vi"?"Hoàn tác":"Undo",()=>{e.sets=old;if(e.isFst7)e.fstWeight=old.length?old[0].weight:null;save();render();});
}
function fstUnlock(exId){const s=ensureSession(S.selDate);const e=s.entries.find(x=>x.exId===exId);if(e){e.fstWeight=null;e.fstUnlocked=true;save();render();}}

let timerInt=null;

 S.rest.dur=sec;S.rest.endsAt=Date.now()+sec*1000;S.rest.running=true;
 renderRestPill();
 if(timerInt)clearInterval(timerInt);
 timerInt=setInterval(tickTimer,250);
}
function tickTimer(){
 if(!S.rest.running)return;
 const rem=Math.max(0,Math.round((S.rest.endsAt-Date.now())/1000));
 renderRestPill();
 if(S.sheet==="timer")renderTimerSheet();
 if(rem<=0){S.rest.running=false;clearInterval(timerInt);timerInt=null;vibrate([30,40,30]);renderRestPill();if(S.sheet==="timer")renderTimerSheet();}
}

 const p=$("#restPill");if(!p)return;const txt=$("#restPillTxt");
 if(!S.rest.running){p.className="restpill";txt.textContent=t("rest");return;}
 const rem=Math.max(0,Math.round((S.rest.endsAt-Date.now())/1000));
 txt.textContent=Math.floor(rem/60)+":"+pad(rem%60);
 p.className="restpill active"+(rem<=10?" warn":"");

function delta(cur,last,inverse){
 if(!last||last===0)return cur>0?{type:"new"}:{type:"flat",pct:0};

 return {type:type,pct:pct};
}

/* ---------- CHART PRIMITIVES (hand-rolled SVG) ---------- */
function emptyChart(msg){return `<div class="empty"><div class="big">📊</div>${esc(msg||t("no_data"))}</div>`;}
function lineChart(pts,unit){
 const W=600,H=220,pl=44,pr=12,pt=14,pb=28;
 const vals=pts.map(p=>p.value);let mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals);
 if(mn===mx){mn=mn*0.95;mx=mx*1.05||1;}const pad=(mx-mn)*0.1;mn-=pad;mx+=pad;if(mn<0)mn=0;
 const x=i=>pl+(pts.length===1?(W-pl-pr)/2:i*(W-pl-pr)/(pts.length-1));
 const y=v=>pt+(1-(v-mn)/(mx-mn))*(H-pt-pb);
 let g="";for(let i=0;i<=4;i++){const v=mn+(mx-mn)*i/4;const yy=y(v);g+=`<line x1="${pl}" y1="${yy}" x2="${W-pr}" y2="${yy}" stroke="var(--line)" stroke-opacity=".5"/><text x="${pl-6}" y="${yy+3}" text-anchor="end" font-size="10" fill="var(--tx-3)" font-family="monospace">${fmtN(v)}</text>`;}
 const dpath=pts.map((p,i)=>(i?"L":"M")+x(i)+" "+y(p.value)).join(" ");
 const apath=dpath+` L${x(pts.length-1)} ${H-pb} L${x(0)} ${H-pb} Z`;
 let dots="";pts.forEach((p,i)=>{dots+=`<circle cx="${x(i)}" cy="${y(p.value)}" r="${p.pr?5:3.5}" fill="${p.pr?"var(--pr)":"var(--gold)"}" stroke="var(--bg-2)" stroke-width="2"/>`;});
 let labels="";const step=Math.ceil(pts.length/6);pts.forEach((p,i)=>{if(i%step===0||i===pts.length-1)labels+=`<text x="${x(i)}" y="${H-8}" text-anchor="middle" font-size="9" fill="var(--tx-3)" font-family="monospace">${esc(p.date.slice(5))}</text>`;});
 return `<svg viewBox="0 0 ${W} ${H}"><defs><linearGradient id="gf" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--gold)" stop-opacity=".25"/><stop offset="1" stop-color="var(--gold)" stop-opacity="0"/></linearGradient></defs>${g}<path d="${apath}" fill="url(#gf)"/><path d="${dpath}" fill="none" stroke="var(--gold)" stroke-width="2.5" stroke-linejoin="round"/>${dots}${labels}</svg>`;
}
function stackedBars(data){
 const W=600,H=220,pl=44,pr=12,pt=14,pb=26;
 const mx=Math.max.apply(null,data.map(d=>d.total))||1;
 const bw=(W-pl-pr)/data.length*0.66,gap=(W-pl-pr)/data.length;
 const y=v=>pt+(1-v/mx)*(H-pt-pb);
 let g="";for(let i=0;i<=4;i++){const v=mx*i/4;const yy=y(v);g+=`<line x1="${pl}" y1="${yy}" x2="${W-pr}" y2="${yy}" stroke="var(--line)" stroke-opacity=".5"/><text x="${pl-6}" y="${yy+3}" text-anchor="end" font-size="10" fill="var(--tx-3)" font-family="monospace">${fmtInt(v)}</text>`;}
 let bars="";data.forEach((d,i)=>{const cx=pl+i*gap+gap/2;let yy=H-pb;
   d.segments.forEach(seg=>{const hh=seg.value/mx*(H-pt-pb);yy-=hh;bars+=`<rect x="${cx-bw/2}" y="${yy}" width="${bw}" height="${hh}" fill="${seg.color}" rx="1"/>`;});
   const cur=i===data.length-1;if(cur)bars+=`<rect x="${cx-bw/2-1}" y="${H-pb-d.total/mx*(H-pt-pb)-1}" width="${bw+2}" height="${d.total/mx*(H-pt-pb)+1}" fill="none" stroke="var(--gold)" stroke-width="1.5" rx="2"/>`;
   if(i%2===0||cur)bars+=`<text x="${cx}" y="${H-8}" text-anchor="middle" font-size="9" fill="${cur?"var(--gold)":"var(--tx-3)"}" font-family="monospace">${esc(d.label)}</text>`;});

function divergingBars(rows){

  if(r.pct==null){s+=`<rect x="${cx+2}" y="${y+4}" width="42" height="${rh-12}" rx="3" fill="var(--gold-wash)"/><text x="${cx+23}" y="${y+rh/2+3}" text-anchor="middle" font-size="9" fill="var(--gold-bright)" font-weight="700">${esc(t("new"))}</text>`;return;}
  const w=Math.abs(r.pct)*scale;const up=r.pct>=0;const x=up?cx+2:cx-2-w;
  s+=`<rect x="${x}" y="${y+4}" width="${Math.max(2,w)}" height="${rh-12}" rx="3" fill="${up?"var(--up)":"var(--down)"}"/>`;
  s+=`<text x="${up?cx+w+8:cx-w-8}" y="${y+rh/2+3}" text-anchor="${up?"start":"end"}" font-size="10" fill="${up?"var(--up)":"var(--down)"}" font-family="monospace" font-weight="700">${up?"+":""}${r.pct.toFixed(0)}%</text>`;
 });

function clip(s,n){s=String(s);return s.length>n?s.slice(0,n-1)+"…":s;}
function mevChart(rows){

 const scale=(W-pl-40)/maxV;

 rows.forEach((r,i)=>{const y=i*rh+6;const zone=r.sets===0?"none":(r.sets<r.mev?"below":(r.sets>r.mav?"above":"in"));
  const col=zone==="in"?"var(--up)":zone==="below"?"var(--warn)":zone==="above"?"var(--down)":"var(--bg-3)";
  s+=`<text x="${pl-8}" y="${y+rh/2}" text-anchor="end" font-size="10" fill="${MCOLOR[r.muscle]}" font-weight="600">${esc(mname(r.muscle))}</text>`;
  s+=`<rect x="${pl}" y="${y+6}" width="${Math.max(2,r.sets*scale)}" height="${rh-16}" rx="3" fill="${col}"/>`;
  s+=`<text x="${pl+Math.max(2,r.sets*scale)+6}" y="${y+rh/2+3}" font-size="10" fill="var(--tx-2)" font-family="monospace" font-weight="700">${r.sets}</text>`;
  // mev/mav ticks
  s+=`<line x1="${pl+r.mev*scale}" y1="${y+2}" x2="${pl+r.mev*scale}" y2="${y+rh-4}" stroke="var(--tx-3)" stroke-dasharray="2 2"/>`;
  s+=`<line x1="${pl+r.mav*scale}" y1="${y+2}" x2="${pl+r.mav*scale}" y2="${y+rh-4}" stroke="var(--down)" stroke-opacity=".6" stroke-dasharray="2 2"/>`;
 });

function bwChart(bw){
 const W=600,H=240,pl=40,pr=40,pt=14,pb=28;
 const w=bw.map(b=>toDisp(b.weight,b.unit));
 let mn=Math.min.apply(null,w),mx=Math.max.apply(null,w);const tgt=DB.settings.units==="kg"?DB.athlete.goal.targetWeightLb/LBPERKG:DB.athlete.goal.targetWeightLb;
 mn=Math.min(mn,tgt);mx=Math.max(mx,tgt);const pad=(mx-mn)*0.12||2;mn-=pad;mx+=pad;
 const n=bw.length;const x=i=>pl+(n===1?(W-pl-pr)/2:i*(W-pl-pr)/(n-1));const y=v=>pt+(1-(v-mn)/(mx-mn))*(H-pt-pb);
 let g="";for(let i=0;i<=4;i++){const v=mn+(mx-mn)*i/4;const yy=y(v);g+=`<line x1="${pl}" y1="${yy}" x2="${W-pr}" y2="${yy}" stroke="var(--line)" stroke-opacity=".5"/><text x="${pl-5}" y="${yy+3}" text-anchor="end" font-size="9" fill="var(--tx-3)" font-family="monospace">${fmtN(v)}</text>`;}
 // target band
 const ty=y(tgt);g+=`<line x1="${pl}" y1="${ty}" x2="${W-pr}" y2="${ty}" stroke="var(--gold)" stroke-dasharray="4 3" stroke-opacity=".8"/><text x="${W-pr}" y="${ty-4}" text-anchor="end" font-size="9" fill="var(--gold-bright)">${fmtN(tgt)}</text>`;
 const wpath=bw.map((b,i)=>(i?"L":"M")+x(i)+" "+y(toDisp(b.weight,b.unit))).join(" ");
 // BF dashed on right axis
 const bf=bw.map(b=>b.bfPct).filter(v=>v!=null);let bfPath="";
 if(bf.length>=2){let bmn=Math.min.apply(null,bw.map(b=>b.bfPct==null?99:b.bfPct)),bmx=Math.max.apply(null,bw.map(b=>b.bfPct==null?0:b.bfPct));if(bmn===bmx){bmn-=1;bmx+=1;}
  const by=v=>pt+(1-(v-bmn)/(bmx-bmn))*(H-pt-pb);
  bfPath=bw.map((b,i)=>b.bfPct==null?"":((bfPath.indexOf("M")<0&&i===0)||true)).length?bw.filter(b=>b.bfPct!=null).map((b,i)=>{const oi=bw.indexOf(b);return (i?"L":"M")+x(oi)+" "+by(b.bfPct);}).join(" "):"";
 }
 let dots="";bw.forEach((b,i)=>dots+=`<circle cx="${x(i)}" cy="${y(toDisp(b.weight,b.unit))}" r="3" fill="var(--tx-1)"/>`);
 let labels="";const step=Math.ceil(n/6);bw.forEach((b,i)=>{if(i%step===0||i===n-1)labels+=`<text x="${x(i)}" y="${H-8}" text-anchor="middle" font-size="9" fill="var(--tx-3)" font-family="monospace">${esc(b.date.slice(5))}</text>`;});
 return `<svg viewBox="0 0 ${W} ${H}">${g}<path d="${wpath}" fill="none" stroke="var(--tx-1)" stroke-width="2.5"/>${bfPath?`<path d="${bfPath}" fill="none" stroke="var(--info)" stroke-width="2" stroke-dasharray="5 3"/>`:""}${dots}${labels}</svg>
   <div class="legend"><span><i style="background:var(--tx-1)"></i>${esc(t("bw_weight"))}</span>${bf.length>=2?`<span><i style="background:var(--info)"></i>${esc(t("bw_bf"))}</span>`:""}<span><i style="background:var(--gold)"></i>${esc(t("target_w"))}</span></div>`;
}
function heatmap(map){
 const weeks=14,cell=15,gap=4,pl=26,pt=14;
 const W=pl+weeks*(cell+gap),H=pt+7*(cell+gap)+6;
 const mon=mondayOf(new Date());mon.setDate(mon.getDate()-(weeks-1)*7);
 let mxv=1;Object.values(map).forEach(v=>{if(v>mxv)mxv=v;});
 const dl=DB.settings.lang==="vi"?["T2","T3","T4","T5","T6","T7","CN"]:["M","T","W","T","F","S","S"];
 let s="";for(let r=0;r<7;r++)s+=`<text x="0" y="${pt+r*(cell+gap)+cell-3}" font-size="8" fill="var(--tx-3)">${dl[r]}</text>`;
 for(let w=0;w<weeks;w++)for(let d=0;d<7;d++){const dt=new Date(mon);dt.setDate(dt.getDate()+w*7+d);const iso=dt.getFullYear()+"-"+pad(dt.getMonth()+1)+"-"+pad(dt.getDate());
   const v=map[iso]||0;const fut=dt>new Date();
   let fill="var(--bg-3)";if(v>0){const inten=0.3+0.7*Math.min(1,v/mxv);fill=`rgba(232,176,75,${inten.toFixed(2)})`;}
   s+=`<rect x="${pl+w*(cell+gap)}" y="${pt+d*(cell+gap)}" width="${cell}" height="${cell}" rx="3" fill="${fut?"transparent":fill}" ${fut?'stroke="var(--line-soft)"':''}><title>${iso}: ${v} sets</title></rect>`;}
 return `<svg viewBox="0 0 ${W} ${H}" style="max-width:${W}px;margin:0 auto">${s}</svg>`;
}

function viewHistory(){

 done.forEach(s=>{const wk=weekKey(s.date);if(wk!==curWk){curWk=wk;const ws=weekStats(wk);let tot=0;Object.values(ws.byMus).forEach(m=>tot+=m.tonnage);

function sessionCard(s){

 h+=`<div class="elist">`;
 s.entries.filter(e=>e.sets.length).forEach(e=>{let best=0,bw=0,br=0;e.sets.forEach(st=>{const er=e1rm(toDisp(st.weight,st.unit),st.reps);if(er>best){best=er;bw=toDisp(st.weight,st.unit);br=st.reps;}});

 h+=`</div></div>`;
 return h;
}

/* ---------- BODYWEIGHT / MISSION ACTIONS ---------- */
function logBw(){
 const w=parseFloat(($("#bwW").value||$("#bwW").placeholder||"").replace(",", "."));
 if(isNaN(w)||w<=0){toast(DB.settings.lang==="vi"?"Nhập cân nặng":"Enter weight");return;}
 const bfRaw=$("#bwBf").value.trim();const bf=bfRaw?parseFloat(bfRaw.replace(",", ".")):null;
 const date=todayISO();const lbm=bf!=null?w*(1-bf/100):null;
 const idx=DB.bodyLog.findIndex(b=>b.date===date);
 const rec={date:date,weight:w,unit:DB.settings.units,bfPct:bf,lbm:lbm};
 if(idx>=0)DB.bodyLog[idx]=rec;else DB.bodyLog.push(rec);
 save();render();toast(DB.settings.lang==="vi"?"Đã lưu cân nặng":"Bodyweight saved");
}

/* ---------- EXPORT / IMPORT ---------- */
function download(name,content,type){
 try{const blob=new Blob([content],{type:type});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=name;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},500);}
 catch(e){const a=document.createElement("a");a.href="data:"+type+";charset=utf-8,"+encodeURIComponent(content);a.download=name;a.click();}
}
function exportJson(){DB.settings.lastBackupAt=new Date().toISOString();persist(true);download("forge-backup-"+todayISO()+".json",JSON.stringify(DB,null,2),"application/json");toast(DB.settings.lang==="vi"?"Đã xuất sao lưu":"Backup exported");}
function exportCsv(){
 let rows=[["date","day","exercise","muscle","isFST7","set","weight","unit","reps","rpe","e1rm","isPR"]];
 completedSessions().forEach(s=>s.entries.forEach(e=>e.sets.forEach(st=>{rows.push([s.date,s.dayKey,(e.name.en||"").replace(/,/g," "),e.muscle,e.isFst7?1:0,st.i,st.weight,st.unit,st.reps,st.rpe==null?"":st.rpe,fmtN(st.e1rm),st.isPR?1:0]);})));
 const csv=rows.map(r=>r.join(",")).join("\n");download("forge-sets-"+todayISO()+".csv",csv,"text/csv");toast("CSV exported");
}
function importJson(){$("#importFile").click();}
function handleImport(file){
 const rd=new FileReader();rd.onload=()=>{try{const obj=JSON.parse(rd.result);
   if(!obj||!obj.program||!obj.sessions){toast(DB.settings.lang==="vi"?"File không hợp lệ":"Invalid backup file");return;}
   const nSess=Object.keys(obj.sessions).length;
   if(confirm((DB.settings.lang==="vi"?"Nhập "+nSess+" buổi tập? Sẽ THAY THẾ dữ liệu hiện tại (đã tạo bản sao lưu).":"Import "+nSess+" sessions? This REPLACES current data (a backup is kept)."))){
     try{localStorage.setItem(KEY+".bak."+Date.now(),JSON.stringify(DB));}catch(_){}
     DB=migrate(obj);persist(true);render();toast(DB.settings.lang==="vi"?"Đã nhập dữ liệu":"Data imported");
   }
 }catch(e){toast(DB.settings.lang==="vi"?"Không đọc được file":"Couldn't read file");}};
 rd.readAsText(file);
}
function resetAll(){if(confirm(t("confirm_reset"))){try{localStorage.setItem(KEY+".bak."+Date.now(),JSON.stringify(DB));}catch(_){}DB=defaultDB();persist(true);S.openEx=null;render();toast(DB.settings.lang==="vi"?"Đã đặt lại":"Reset done");}}

/* ---------- SHEETS / TOASTS / FX ---------- */
function openSheet(html){$("#sheetBody").innerHTML=html;$("#scrim").classList.add("show");$("#sheet").classList.add("show");}
function closeSheet(){$("#scrim").classList.remove("show");$("#sheet").classList.remove("show");S.sheet=null;}
function showBanner(msg){const b=document.createElement("div");b.className="banner";b.textContent=msg;document.body.insertBefore(b,$("#main"));setTimeout(()=>b.remove(),12000);}
let toastT=null;
function toast(msg,actionLabel,actionFn,dur){
 const wrap=$("#toasts");const el=document.createElement("div");el.className="toast";
 el.innerHTML=`<span>${esc(msg)}</span>`+(actionLabel?`<span class="undo">${esc(actionLabel)}</span>`:"");
 if(actionLabel&&actionFn){el.querySelector(".undo").addEventListener("click",()=>{actionFn();el.remove();});}
 wrap.appendChild(el);setTimeout(()=>{el.style.opacity="0";el.style.transition="opacity .3s";setTimeout(()=>el.remove(),320);},dur||3200);
}
function celebratePR(exId){
 toast(t("new_pr"),null,null,2600);const tEl=$(".toasts .toast:last-child");if(tEl)tEl.classList.add("pr");
 vibrate(30);
 if(window.matchMedia&&window.matchMedia("(prefers-reduced-motion:reduce)").matches)return;
 const colors=["#FFD466","#E8B04B","#F4C463","#FFFFFF"];
 for(let i=0;i<22;i++){const s=document.createElement("div");s.className="spark";s.style.background=colors[i%colors.length];
   s.style.left=(50+(Math.random()*30-15))+"%";s.style.top="40%";document.body.appendChild(s);
   const ang=Math.random()*Math.PI*2,dist=80+Math.random()*120;const dx=Math.cos(ang)*dist,dy=Math.sin(ang)*dist-60;
   s.animate([{transform:"translate(0,0) scale(1)",opacity:1},{transform:`translate(${dx}px,${dy}px) scale(0)`,opacity:0}],{duration:600+Math.random()*300,easing:"cubic-bezier(0.22,1,0.36,1)"}).onfinish=()=>s.remove();
 }
}
function vibrate(p){try{if(navigator.vibrate)navigator.vibrate(p);}catch(e){}}

/* ---------- EVENTS ---------- */
document.addEventListener("click",e=>{
 const a=e.target.closest("[data-act]");if(!a)return;
 const act=a.dataset.act,id=a.dataset.exid;
 switch(act){
  case"toggleEx":S.openEx=(S.openEx===id?null:id);render();break;
  case"dateShift":shiftDate(+a.dataset.d);break;
  case"goToday":S.selDate=todayISO();S.openEx=null;render();break;
  case"pickWorkout":setWorkout(S.selDate,a.dataset.wk);break;
  case"addExercise":addExercise();break;
  case"editExercise":{const wk=ensureSession(S.selDate).workoutKey;openExerciseSheet(wk,id);}break;
  case"saveExercise":saveExercise();break;
  case"removeExercise":removeExercise(id);break;
  case"logSet":logSet(id);break;
  case"addSet":addSet(id);break;
  case"repeatSet":repeatSet(id);break;
  case"delSet":delSet(id,+a.dataset.i);break;
  case"copyWeek":copyWeek(id);break;
  case"fstUnlock":fstUnlock(id);break;
  case"toggleLang":DB.settings.lang=DB.settings.lang==="vi"?"en":"vi";save();render();break;
  case"setLang":DB.settings.lang=a.dataset.v;save();render();break;
  case"setUnit":DB.settings.units=a.dataset.v;DB.settings.plateIncrement=a.dataset.v==="kg"?2.5:5;save();render();break;
  case"setRpe":DB.settings.showRPE=a.dataset.v==="1";save();render();break;
  case"openTimer":openTimerSheet();break;
  case"closeSheet":closeSheet();break;
  case"timerAdj":timerAdj(+a.dataset.d);break;
  case"timerReset":timerReset();break;
  case"selStatsEx":S.statsExId=a.dataset.id;DB.settings.lastStatsExId=a.dataset.id;save();drawProgress();$$("#exSel .chip").forEach(c=>c.classList.toggle("sel",c.dataset.id===a.dataset.id));break;
  case"logBw":logBw();break;
  case"exportJson":exportJson();break;
  case"exportCsv":exportCsv();break;
  case"importJson":importJson();break;
  case"resetAll":resetAll();break;
  case"delSession":if(confirm(DB.settings.lang==="vi"?"Xóa buổi tập này?":"Delete this session?")){const d=a.dataset.date;const bak=DB.sessions[d];delete DB.sessions[d];save();render();toast(DB.settings.lang==="vi"?"Đã xóa":"Deleted",DB.settings.lang==="vi"?"Hoàn tác":"Undo",()=>{DB.sessions[d]=bak;save();render();});}break;
  case"toggleCheck":{const s=ensureSession(S.selDate);s.checks=s.checks||{};s.checks[a.dataset.key]=!s.checks[a.dataset.key];save();render();}break;
 }
});
$$("#tabbar button").forEach(b=>b.addEventListener("click",()=>{S.tab=b.dataset.tab;DB.meta.lastTab=S.tab;save();render();}));

// input handlers (delegated) for settings & numeric live-edit
document.addEventListener("change",e=>{
 const a=e.target.closest("[data-act]");if(!a)return;
 if(a.dataset.act==="setPlate"){const v=parseFloat(e.target.value);if(v>0){DB.settings.plateIncrement=v;save();}}
 if(a.dataset.act==="setRestDef"){const v=parseInt(e.target.value);if(v>0){DB.settings.restDefaultSec=v;save();}}
 if(a.dataset.act==="setFstRest"){const v=parseInt(e.target.value);if(v>0){DB.settings.fst7RestSec=v;save();}}
 if(a.dataset.act==="cardioInput"){const s=ensureSession(S.selDate);s.cardioMin=parseInt(e.target.value)||null;save();}
});
$("#importFile")&&0; // placeholder
document.addEventListener("change",e=>{if(e.target&&e.target.id==="importFile"&&e.target.files&&e.target.files[0])handleImport(e.target.files[0]);});

// steppers: tap + hold-to-repeat
document.addEventListener("pointerdown",e=>{
 const b=e.target.closest("[data-step]");if(!b)return;
 e.preventDefault();
 const exId=b.dataset.exid,which=b.dataset.step,dir=+b.dataset.dir;
 stepApply(exId,which,dir);vibrate(8);
 holdTimer=setTimeout(()=>{holdInt=setInterval(()=>stepApply(exId,which,dir),90);},420);
});
function clearHold(){if(holdTimer){clearTimeout(holdTimer);holdTimer=null;}if(holdInt){clearInterval(holdInt);holdInt=null;}}
document.addEventListener("pointerup",clearHold);
document.addEventListener("pointercancel",clearHold);
document.addEventListener("pointerleave",clearHold);

/* ---------- INIT ---------- */
function boot(){
 try{
  load();
  S.tab=DB.meta.lastTab||"today";
  S.selDate=todayISO();S.date=todayISO();
  S.statsExId=DB.settings.lastStatsExId||null;
  render();
  setInterval(()=>{if(S.tab==="today")renderHeader();},30000); // refresh road rail / day if left open
 }catch(err){
  document.getElementById("main").innerHTML='<div class="banner">App error: '+esc(err&&err.message)+'. Try Mission › Reset, or reload.</div>';
  console.error(err);
 }
}
boot();
})();
</script>
